<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>EduKompas.AI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&family=Nunito:wght@600;700;800;900&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Nunito', 'system-ui', 'sans-serif'],
            display: ['"Baloo 2"', 'system-ui', 'sans-serif'],
          },
          colors: {
            coral: { DEFAULT: '#FF6B6B', dark: '#E55A5A' },
            lavender: { DEFAULT: '#8A78FA', dark: '#6C5CE7' },
            mint: { DEFAULT: '#00D2A0', dark: '#00B894' },
            sunny: { DEFAULT: '#FFD93D', dark: '#FDCB6E' },
            sky: { DEFAULT: '#45B3FF', dark: '#0984E3' },
            warm: { DEFAULT: '#FF8C66', dark: '#E17055' },
            charcoal: '#2D3436',
            offwhite: '#F4F7FF'
          },
          backgroundImage: {
            'cosmic': 'radial-gradient(circle at 50% 0%, #4A3B8C 0%, #1A1438 100%)',
            'pastel': 'linear-gradient(135deg, #E0C3FC 0%, #8EC5FC 100%)',
            'glass': 'linear-gradient(135deg, rgba(255,255,255,0.4) 0%, rgba(255,255,255,0.1) 100%)',
          },
          boxShadow: {
            '3d-primary': '0 6px 0 0 #E55A5A, 0 12px 20px -4px rgba(255, 107, 107, 0.4)',
            '3d-secondary': '0 6px 0 0 #6C5CE7, 0 12px 20px -4px rgba(138, 120, 250, 0.4)',
            '3d-success': '0 6px 0 0 #00B894, 0 12px 20px -4px rgba(0, 210, 160, 0.4)',
            '3d-white': '0 6px 0 0 #E2E8F0, 0 12px 20px -4px rgba(0, 0, 0, 0.1)',
            'glass': '0 8px 32px 0 rgba(31, 38, 135, 0.15)',
          }
        }
      }
    }
  </script>
  <style>
    body {
      margin: 0;
      padding: 0;
      background-color: #F4F7FF;
      color: #2D3436;
      overflow-x: hidden;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }
    
    /* Custom Animations */
    @keyframes bounce-soft {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }
    @keyframes float {
      0%, 100% { transform: translateY(0) rotate(0deg); }
      50% { transform: translateY(-8px) rotate(2deg); }
    }
    @keyframes pop-in {
      0% { transform: scale(0.5); opacity: 0; }
      70% { transform: scale(1.1); opacity: 1; }
      100% { transform: scale(1); opacity: 1; }
    }
    @keyframes pulse-glow {
      0%, 100% { box-shadow: 0 0 0 0 rgba(255, 217, 61, 0.4); }
      50% { box-shadow: 0 0 0 15px rgba(255, 217, 61, 0); }
    }
    @keyframes wiggle {
      0%, 100% { transform: rotate(0); }
      25% { transform: rotate(-10deg); }
      75% { transform: rotate(10deg); }
    }
    @keyframes confetti-fall {
      0% { transform: translateY(-10vh) rotate(0deg); opacity: 1; }
      100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
    }
    @keyframes blink {
      0%, 90%, 100% { transform: scaleY(1); }
      95% { transform: scaleY(0.1); }
    }
    @keyframes talk-mouth {
      0%, 100% { transform: scaleY(0.4); }
      50% { transform: scaleY(1.1); }
    }
    @keyframes spin-slow {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    .animate-bounce-soft { animation: bounce-soft 2s ease-in-out infinite; }
    .animate-float { animation: float 4s ease-in-out infinite; }
    .animate-pop-in { animation: pop-in 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards; }
    .animate-pulse-glow { animation: pulse-glow 2s infinite; }
    .animate-wiggle { animation: wiggle 0.4s ease-in-out; }
    .animate-blink { animation: blink 4s infinite; transform-origin: center; }
    .animate-talk-mouth { animation: talk-mouth 0.2s infinite; transform-origin: 100px 111px; }
    .animate-spin-slow { animation: spin-slow 15s linear infinite; }

    /* Hide scrollbar for clean UI */
    ::-webkit-scrollbar { display: none; }
    * { scrollbar-width: none; }

    /* 3D Button Active State */
    .btn-3d:active {
      transform: translateY(6px);
      box-shadow: 0 0px 0 0 transparent, 0 4px 10px -4px rgba(0,0,0,0.2) !important;
    }
  </style>
  </head>
<body>
  <div id="root"></div>
  <script type="module" src="./index.tsx"></script>
<script type="module" src="/index.js"></script></body>
</html>
